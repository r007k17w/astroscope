<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: page(~{::body})}">
<body>
<section>
    <h1>Star Catalog</h1>
    <form method="get">
        <label>Query <input name="q" th:value="${query}"/></label>
        <label>Ranking mode
            <select name="ranking">
                <option value="mag" th:selected="${ranking == 'mag'}">Magnitude</option>
                <option value="name" th:selected="${ranking == 'name'}">Name</option>
                <option value="designation" th:selected="${ranking == 'designation'}">Designation</option>
            </select>
        </label>
        <button type="submit">Search</button>
    </form>
    <p>Ranking profile: <span th:text="${ranking}">mag</span></p>
    <table>
        <thead><tr><th>Designation</th><th>Name</th><th>Constellation</th><th>Mag</th></tr></thead>
        <tbody>
        <tr th:each="star : ${results}">
            <td th:text="${star.designation}">HD</td>
            <td th:text="${star.commonName}">Name</td>
            <td th:text="${star.constellation}">Con</td>
            <td th:text="${star.magnitude}">0</td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
