<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: page(~{::body})}">
<body>
<section>
    <h1>New Observation</h1>
    <form method="post" action="/observations">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label>Title <input name="title" required/></label>
        <label>Target object <input name="targetObject"/></label>
        <label>Group slug <input name="groupSlug" placeholder="ligo-collab"/></label>
        <label>Markdown body<textarea name="body" rows="10" required></textarea></label>
        <label><input type="checkbox" name="isPrivate" value="true"/> Private</label>
        <button type="submit">Publish</button>
    </form>
</section>
</body>
</html>
