<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: page(~{::body})}">
<body>
<section>
    <h1 th:text="${group.name}">Group</h1>
    <p th:text="${group.description}">Description</p>
    <p th:if="${canModerate}">You can moderate this group.</p>
    <p th:if="${message}" th:text="${message}"></p>
    <p th:if="${error}" th:text="${error}" class="error"></p>
    <form method="post" th:action="@{/groups/{slug}/delegate(slug=${group.slug})}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label>Delegate moderation to <input name="delegateUsername" placeholder="guest"/></label>
        <button type="submit">Grant delegation</button>
    </form>
    <form method="post" th:action="@{/groups/{slug}/revoke(slug=${group.slug})}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label>Revoke delegate <input name="delegateUsername" placeholder="guest"/></label>
        <button type="submit">Revoke delegation</button>
    </form>
    <form method="post" th:action="@{/groups/{slug}/moderate(slug=${group.slug})}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit">Run moderation action</button>
    </form>
    <p>Collaboration invite token: <code th:text="${inviteToken}">token</code></p>
</section>
</body>
</html>
