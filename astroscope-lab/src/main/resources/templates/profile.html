<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: page(~{::body})}">
<body>
<section>
    <h1>Your Profile</h1>
    <p>Username: <span th:text="${safeUsername}">user</span></p>
    <p>Role: <span th:text="${user.role}">MEMBER</span> · Verified: <span th:text="${user.verified}">false</span></p>
    <form method="post" action="/profile">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label>Display name <input name="displayName" th:value="${user.displayName}"/></label>
        <label>Institution <input name="institution" th:value="${user.institution}"/></label>
        <label>Bio<textarea name="bio" rows="6" th:text="${user.bio}"></textarea></label>
        <button type="submit">Save</button>
    </form>
    <p>API patch endpoint: <code>PATCH /api/profile</code></p>
</section>
</body>
</html>
