<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: page(~{::body})}">
<body>
<section>
    <h1>Import External Metadata</h1>
    <form method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label>Metadata URL <input name="url" placeholder="https://api.nasa.gov/..."/></label>
        <button type="submit">Fetch</button>
    </form>
    <p th:if="${success}" th:text="${result}">Result</p>
    <p th:if="${error}" th:text="${error}" class="error"></p>
</section>
</body>
</html>
