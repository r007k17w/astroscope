<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: page(~{::body})}">
<body>
<section>
    <h1>Collaboration Groups</h1>
    <ul>
        <li th:each="group : ${groups}">
            <a th:href="@{/groups/{slug}(slug=${group.slug})}" th:text="${group.name}">Group</a>
        </li>
    </ul>
</section>
</body>
</html>
